<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .admin-image {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 50%;
    }
    .nav-link {
      margin: 0 10px;
    }
    footer {
      background-color: #f8f9fa;
      padding: 10px 0;
      text-align: center;
      margin-top: auto;
    }
    .navbar {
      background-color: #343a40;
    }
    .navbar .nav-link, .navbar-brand, .dropdown-toggle {
      color: white;
    }
    .navbar .nav-link:hover, .navbar-brand:hover, .dropdown-item:hover {
      color: #ffc107;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .content {
      flex: 1;
    }



    .search-clear-btn {
      cursor: pointer;
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #aaa;
    }
    .search-container {
      position: relative;
    }
    .search-input {
      padding-right: 30px;
    }
    .action-buttons button {
      margin-right: 5px;
    }
    th, td {
      vertical-align: middle;
    }

  </style>
</head>

<body>

  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-dark px-3">
    <a class="navbar-brand" href="#">The Untold Stories</a>

    <div class="collapse navbar-collapse justify-content-center">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Customers</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Category</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Add Product</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Coupon</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Banner</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Orders</a></li>
      </ul>
    </div>

    <!-- Admin Dropdown -->
    <div class="dropdown">
      <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="adminDropdown" data-bs-toggle="dropdown" aria-expanded="false">
        <img src="https://via.placeholder.com/40" alt="Admin" class="admin-image">
      </a>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="adminDropdown">
        <li><a class="dropdown-item" href="/admin/logout">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Content Area -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Customers</h3>

    <!-- Search Bar -->
    <div class="search-container">
      <input type="text" class="form-control search-input" id="searchInput" placeholder="Search customers...">
      <span class="search-clear-btn" id="clearSearch" style="display: none;">&times;</span>
    </div>
  </div>

  <!-- Customer Table -->
  <div class="table-responsive">
    <table class="table table-bordered table-striped text-center align-middle">
      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="customerTable">
        <!-- Example row -->
        <tr>
          <td>John Doe</td>
          <td>john@example.com</td>
          <td>1234567890</td>
          <td class="action-buttons">
            <button class="btn btn-sm btn-danger">Block</button>
            <button class="btn btn-sm btn-success">Unblock</button>
          </td>
        </tr>
        <!-- You can use loop for more rows if rendering with a backend -->
      </tbody>
    </table>
  </div>
 

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">© 2025 The Untold Stories Admin. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearSearch");

    searchInput.addEventListener("input", () => {
      clearBtn.style.display = searchInput.value ? "block" : "none";
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.style.display = "none";
      searchInput.focus();
    });
  </script>
</body>
</html>
